services:
  - type: web
    name: helphive-api
    runtime: node
    rootDir: .
    buildCommand: npm --prefix ./server install
    startCommand: npm --prefix ./server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
